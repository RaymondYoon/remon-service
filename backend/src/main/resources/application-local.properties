# ── 로컬 DB ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/remon?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.username=remon_user
spring.datasource.password=remon_password

# ── JPA (로컬에서는 SQL 확인) ─────────────────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── 카카오 로컬 redirect ──────────────────────────────────────────────────
kakao.redirect-uri=http://localhost:8080/api/auth/kakao/callback
frontend.oauth-callback-url=http://localhost:3000/oauth-callback
