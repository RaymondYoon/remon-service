spring.application.name=remon-service

# DB 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 서버
server.port=${PORT:8080}

# JWT 설정 (운영 환경에서는 환경변수 JWT_SECRET 으로 교체할 것)
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# 카카오 OAuth (운영 환경에서는 환경변수로 교체할 것)
kakao.client-id=${KAKAO_CLIENT_ID}
kakao.client-secret=${KAKAO_CLIENT_SECRET}
kakao.redirect-uri=https://remon-service-production.up.railway.app/api/auth/kakao/callback

# kakao.redirect-uri=http://localhost:8080/api/auth/kakao/callback

# 카카오 로그인 완료 후 프론트엔드 redirect URL
frontend.oauth-callback-url=https://remon-service.vercel.app/oauth-callback
# frontend.oauth-callback-url=http://localhost:3000/oauth-callback

# OpenAI (운영 환경에서는 환경변수 OPENAI_API_KEY 로 교체할 것)
openai.api-key=${OPENAI_API_KEY}
openai.model=gpt-5-mini
openai.url=https://api.openai.com/v1/chat/completions
openai.timeout-ms=30000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
